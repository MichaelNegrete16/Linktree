name: Refrescar datos de Instagram

on:
  schedule:
    # cada 6 horas (UTC). Ajusta el cron si quieres otra frecuencia.
    - cron: "0 */6 * * *"
  workflow_dispatch: {} # permite ejecutarlo a mano desde la pestaña Actions

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Refrescar datos e imágenes de Instagram
        run: node scripts/refresh-ig.mjs

      - name: Commit si hay cambios
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if [ -n "$(git status --porcelain)" ]; then
            git add -A
            git commit -m "chore: auto-refresh Instagram ($(date -u '+%Y-%m-%d %H:%M UTC'))"
            git push
          else
            echo "Sin cambios — no hay nada que actualizar."
          fi
